<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jenish Budhathoki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111318;
      --card: #1a1d24;
      --surface: #21252e;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text-primary: #f0f1f3;
      --text-secondary: #8b8f9a;
      --text-muted: #5a5f6e;
      --accent: #4d8fdb;
      --accent-soft: rgba(77,143,219,0.15);
      --amber: #e8a94a;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; color: var(--text-primary); }
    .card { background: var(--card); border-radius: 20px; width: 100%; max-width: 380px; overflow: hidden; border: 0.5px solid var(--border-strong); }

    /* Header */
    .header { padding: 1.75rem 1.75rem 1.5rem; border-bottom: 0.5px solid var(--border); }
    .header-content { display: flex; gap: 1.25rem; align-items: flex-start; }
    .avatar { width: 66px; height: 66px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-strong); flex-shrink: 0; }
    .header-text { flex: 1; min-width: 0; }
    .name { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; letter-spacing: -0.01em; }
    .affil-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .affil-row { display: flex; align-items: flex-start; gap: 7px; }
    .affil-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .affil-dot.research { background: var(--accent); }
    .affil-dot.biz { background: var(--amber); }
    .affil-link { font-size: 12px; color: var(--text-secondary); line-height: 1.4; text-decoration: none; transition: color 0.15s; }
    .affil-link:hover { color: var(--text-primary); }
    .affil-link em { color: var(--text-muted); font-style: normal; }
    .badges { display: flex; flex-wrap: wrap; gap: 5px; }
    .badge { font-size: 10.5px; font-weight: 500; padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 0.5px solid var(--border-strong); }

    /* Contact */
    .body { padding: 1.25rem 1.75rem; }
    .contact-row { display: flex; align-items: center; gap: 11px; padding: 9px 0; border-bottom: 0.5px solid var(--border); text-decoration: none; color: inherit; transition: opacity 0.15s; }
    .contact-row:last-child { border-bottom: none; }
    .contact-row:hover { opacity: 0.7; }
    .contact-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 0.5px solid var(--border); }
    .contact-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .contact-label { font-size: 11px; color: var(--text-muted); min-width: 52px; }
    .contact-value { font-size: 13px; font-weight: 500; color: var(--accent); word-break: break-all; }

    /* Footer */
    .footer { border-top: 0.5px solid var(--border); padding: 1rem 1.75rem; display: flex; gap: 8px; }
    .btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; text-decoration: none; border: none; font-family: 'Inter', sans-serif; }
    .btn svg { width: 14px; height: 14px; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; fill: none; flex-shrink: 0; }
    .btn-outline { background: var(--surface); border: 0.5px solid var(--border-strong); color: var(--text-primary); }
    .btn-outline svg { stroke: var(--text-primary); }
    .btn-outline:hover { background: rgba(255,255,255,0.08); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary svg { stroke: #fff; }
    .btn-primary:hover { background: #3a7bc8; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); color: var(--text-primary); font-size: 13px; padding: 10px 20px; border-radius: 30px; border: 0.5px solid var(--border-strong); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) { body { padding: 1rem 0.75rem; align-items: flex-start; } }
  </style>
</head>
